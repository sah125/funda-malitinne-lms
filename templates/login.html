<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Funda Malitinne LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/static/Malitinne-logo-v.ico">
    <style>
        body {
            background: linear-gradient(135deg, #fbf3a9 0%, #9f7734 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            max-width: 450px;
            margin: auto;
            padding-top: 100px;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #fbf3a9 0%, #f5e894 100%);
            color: #5a421e;
            text-align: center;
            padding: 30px;
        }
        .card-header img {
            height: 60px;
            margin-bottom: 15px;
        }
        .card-header h3 {
            margin: 0;
            font-weight: 700;
        }
        .card-header p {
            margin: 5px 0 0;
            opacity: 0.8;
        }
        .card-body {
            background: white;
            padding: 40px;
        }
        .btn-login {
            background: linear-gradient(135deg, #9f7734 0%, #8b6630 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            color: white;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(159, 119, 52, 0.4);
        }
        .forgot-link a {
            color: #9f7734;
        }
        .register-link a {
            color: #9f7734;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <img src="/static/Malitinne-logo.png" alt="Funda Malitinne Logo">
                <h3>Funda Malitinne</h3>
                <p>Learning Management System</p>
            </div>
            <div class="card-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="forgot-link text-end mb-3">
                        <a href="{% url 'forgot_password' %}">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-login">Login</button>
                </form>
                
                <div class="register-link text-center mt-3">
                    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
