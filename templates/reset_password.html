<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Funda Malitinne LMS</title>
    <!-- Malitinne Logo Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/Malitinne-logo-v.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/static/Malitinne-logo-v.ico">
    <link rel="apple-touch-icon" href="/static/Malitinne-logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">Reset Password</h3>
                    
                    {% if valid %}
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label>New Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Confirm Password</label>
                                <input type="password" name="password2" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                        </form>
                    {% else %}
                        <div class="alert alert-danger">
                            Invalid or expired reset link. Please request a new one.
                        </div>
                        <a href="/forgot-password/" class="btn btn-primary w-100">Request New Link</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
