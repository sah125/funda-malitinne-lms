<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funda Malitinne LMS - Empowering Education</title>
    
    <!-- Malitinne Logo Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/Malitinne-logo-v.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/static/Malitinne-logo-v.ico">
    <link rel="apple-touch-icon" href="/static/Malitinne-logo.png">
    
    <!-- Bootstrap & Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Brand Colors */
        :root {
            --primary-gold: #fbf3a9;
            --primary-gold-rgb: 251, 243, 169;
            --secondary-brown: #9f7734;
            --secondary-brown-rgb: 159, 119, 52;
            --dark: #2c2c2c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        
        /* Navbar - Brown Background */
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
        
        .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }
        
        /* Buttons - Brown Gradient */
        .btn-primary {
            background: linear-gradient(135deg, #9f7734 0%, #8b6630 100%);
            border: none;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #8b6630 0%, #7a5828 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(159, 119, 52, 0.4);
        }
        
        .btn-success {
            background: #9f7734;
            border: none;
        }
        
        .btn-success:hover {
            background: #8b6630;
        }
        
        /* Card Headers - Gold */
        .card-header {
            background: linear-gradient(135deg, #fbf3a9 0%, #f5e894 100%);
            color: #5a421e;
            font-weight: 600;
        }
        
        /* Progress Bar */
        .progress-bar {
            background: linear-gradient(135deg, #9f7734 0%, #8b6630 100%);
        }
        
        /* Footer - Brown */
        footer {
            background: #2c2c2c;
            color: white;
            padding: 30px 0;
            margin-top: 50px;
        }
        
        /* Dashboard Stats */
        .stat-card {
            background: linear-gradient(135deg, #fbf3a9 0%, #f5e894 100%);
            border-left: 4px solid #9f7734;
        }
        
        .stat-number {
            color: #9f7734;
        }
        
        /* Course Cards */
        .course-card:hover {
            border-color: #9f7734;
        }
        
        /* Sidebar (Admin) */
        .sidebar {
            background: linear-gradient(180deg, #2c2c2c 0%, #1a1a1a 100%);
        }
        
        .sidebar-menu-item:hover {
            background: rgba(159, 119, 52, 0.2);
            border-left-color: #9f7734;
        }
        
        /* Login/Register Cards */
        .card {
            border-radius: 20px;
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, #fbf3a9 0%, #f5e894 100%);
            color: #5a421e;
            text-align: center;
            padding: 30px;
        }
        
        /* Loading Spinner */
        .spinner-border {
            color: #9f7734 !important;
        }
        
        /* Links */
        a {
            color: #9f7734;
            text-decoration: none;
        }
        
        a:hover {
            color: #8b6630;
            text-decoration: underline;
        }
        
        /* Badges */
        .badge-primary {
            background: #9f7734;
            color: white;
        }
        
        /* Alert Info */
        .alert-info {
            background: #fbf3a9;
            border-color: #9f7734;
            color: #5a421e;
        }
    </style>
</head>
<body>
    <!-- Your content here -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/static/Malitinne-logo.png" alt="Funda Malitinne Logo" height="40">
                Funda Malitinne
            </a>
            <!-- Rest of navbar -->
        </div>
    </nav>
    
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Funda Malitinne Learning Management System. All rights reserved.</p>
            <p>Empowering Education, Transforming Lives</p>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
